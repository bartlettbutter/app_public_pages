# Jekyll configuration for the Journeyfolio marketing page.
# Fields used by _layouts/default.html:
#   title       — App name shown in the header and browser tab
#   description — Short tagline displayed below the icon
#   icon        — Filename of the app icon image (relative to this folder)
#   url         — Canonical URL for this page on GitHub Pages
theme: minima
title: Journeyfolio
description: "Plan, organize, and track your trips with live weather and flight tracking."
url: "https://bartlettbutter.github.io/app_public_pages/marketing-url/journeyfolio"
icon: "icon_Journeyfolio.png"
