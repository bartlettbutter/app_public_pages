<!--
  default.html — Shared layout for all app public pages (marketing, privacy, support).

  This layout is used by all Jekyll sub-sites in this repository. Each sub-site
  provides its own _config.yml with the following fields consumed here:
    - site.title       → App name displayed in the header and page <title>
    - site.description → Short tagline shown below the icon in the header
    - site.icon        → Filename of the app icon (e.g. "icon_Barkpedia.png").
                         If omitted, the icon header section is skipped entirely.

  Page structure:
    1. App Header  — Icon + app name + description (only rendered if site.icon is set)
    2. Content     — Rendered markdown from the page's index.md
    3. Footer      — Copyright line with current year and app name

  Design notes:
    - Apple-inspired minimal aesthetic with system font stack
    - Max-width 720px, centered, with generous whitespace
    - The first h1 in content-body is auto-centered (used for marketing taglines)
    - Responsive: padding adjusts for mobile via viewport meta tag
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    /* === Reset & Base === */
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      line-height: 1.7;
      color: #1d1d1f;
      background: #fafafa;
    }

    /* === App Header (icon + title + description) === */
    .app-header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #e5e5e5;
    }
    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;                        /* iOS-style rounded corners */
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);   /* Subtle depth */
      margin-bottom: 1rem;
    }
    .app-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1d1d1f;
      margin: 0;
    }
    .app-header p {
      color: #6e6e73;
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }

    /* === Links === */
    a {
      color: #0071e3;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }

    /* === Typography === */
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #1d1d1f;
    }
    h2 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      color: #1d1d1f;
    }
    h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 1.5rem;
      color: #1d1d1f;
    }
    p {
      margin-bottom: 1rem;
      color: #424245;
    }
    ul {
      padding-left: 1.5rem;
    }
    li {
      margin-bottom: 0.5rem;
      color: #424245;
    }
    blockquote {
      border-left: 3px solid #d2d2d7;
      margin: 1.5rem 0;
      padding: 0.5rem 1rem;
      color: #6e6e73;
      font-style: italic;
    }

    /* === Tables (used in ETFWise marketing page) === */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid #e5e5e5;
    }
    th {
      font-weight: 600;
      color: #1d1d1f;
      background: #f5f5f7;
    }

    /* === Inline emphasis === */
    strong {
      font-weight: 600;
      color: #1d1d1f;
    }

    /* === Content body: center the first h1 (marketing taglines) === */
    .content-body h1:first-child {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 1.5rem;
    }

    /* === Footer === */
    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e5e5;
      text-align: center;
      font-size: 0.85rem;
      color: #86868b;
    }
  </style>
</head>
<body>
  <!-- App Header: only rendered when site.icon is defined in _config.yml -->
  {% if site.icon %}
  <div class="app-header">
    <img src="{{ site.icon }}" alt="{{ site.title }} icon" class="app-icon">
    <h1>{{ site.title }}</h1>
    {% if site.description %}<p>{{ site.description }}</p>{% endif %}
  </div>
  {% endif %}

  <!-- Main content: rendered from the page's index.md -->
  <div class="content-body">
    {{ content }}
  </div>

  <!-- Footer with dynamic year -->
  <div class="footer">
    &copy; {{ 'now' | date: "%Y" }} {{ site.title }}
  </div>
</body>
</html>
